<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="port">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>port</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* background-color: #0d0d0d; */
    }

    /* ── Splash Screen ── */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      /* background: #0d0d0d; */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Logo / Icon */
    .splash-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      /* background: linear-gradient(135deg, #6C63FF, #3ECFCF); */
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.8s ease-in-out infinite;
      /* box-shadow: 0 0 40px rgba(108, 99, 255, 0.5); */
    }

    .splash-logo svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    /* App name */
    .splash-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 2px;
      animation: fadeInUp 0.8s ease forwards;
    }

    /* Animated dots loader */
    .splash-loader {
      display: flex;
      gap: 8px;
    }

    .splash-loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6C63FF;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .splash-loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .splash-loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* Keyframes */
    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Splash screen — จะหายไปเมื่อ Flutter โหลดเสร็จ -->
  <div id="splash-screen">
    <div class="splash-logo">
      <!-- แทนด้วย logo ของคุณ หรือใส่ <img src="icons/Icon-192.png"> -->
      <img src="icons/cat_two.gif" alt="cat">
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // รอให้ Flutter engine พร้อมแล้วค่อย fade out splash
    window.addEventListener("flutter-first-frame", function () {
      const splash = document.getElementById("splash-screen");
      if (splash) {
        splash.classList.add("hidden");
        // ลบ element ออกจาก DOM หลัง transition เสร็จ
        splash.addEventListener("transitionend", () => splash.remove(), { once: true });
      }
    });
  </script>
  <script src='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs' type='module'></script>
  <script type='module'>
    var { pdfjsLib } = globalThis;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.mjs';

    var pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/cmaps/',
      cMapPacked: true,
    }
  </script>

</body>

</html>
